<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Realtime Speech AI Agent</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f23;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: #1a1a3e;
            padding: 16px 24px;
            border-bottom: 1px solid #2a2a5e;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .header h1 {
            font-size: 18px;
            color: #7b8cff;
        }
        .status-badge {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }
        .status-idle { background: #333; color: #888; }
        .status-listening { background: #1a3a1a; color: #4caf50; }
        .status-transcribing { background: #3a3a1a; color: #ffc107; }
        .status-thinking { background: #1a2a3a; color: #2196f3; }
        .status-answering { background: #2a1a3a; color: #9c27b0; }
        .status-error { background: #3a1a1a; color: #f44336; }

        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 900px;
            width: 100%;
            margin: 0 auto;
            padding: 20px;
            gap: 16px;
        }

        .panel {
            background: #1a1a2e;
            border: 1px solid #2a2a4e;
            border-radius: 12px;
            padding: 16px;
        }
        .panel-title {
            font-size: 13px;
            color: #7b8cff;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }

        .transcript-area {
            flex: 1;
            min-height: 200px;
            max-height: 400px;
            overflow-y: auto;
        }
        .transcript-line {
            padding: 6px 0;
            border-bottom: 1px solid #1a1a3e;
            font-size: 14px;
            line-height: 1.5;
        }
        .transcript-line.partial {
            color: #888;
            font-style: italic;
        }
        .transcript-line.final {
            color: #e0e0e0;
        }
        .transcript-line .lang-tag {
            font-size: 11px;
            color: #7b8cff;
            margin-right: 8px;
        }

        .answer-area {
            min-height: 80px;
            max-height: 200px;
            overflow-y: auto;
            font-size: 14px;
            line-height: 1.6;
            color: #a8d8a8;
        }

        .notes-area {
            max-height: 150px;
            overflow-y: auto;
        }
        .note-item {
            padding: 4px 0;
            font-size: 13px;
            color: #ffc107;
        }
        .note-item::before {
            content: "📝 ";
        }

        .controls {
            display: flex;
            gap: 12px;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        .btn {
            padding: 12px 28px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-record {
            background: #4caf50;
            color: white;
        }
        .btn-record.recording {
            background: #f44336;
            animation: pulse 1.5s infinite;
        }
        .btn-stop { background: #666; color: white; }
        .btn-interrupt { background: #ff9800; color: white; }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(244, 67, 54, 0.4); }
            50% { box-shadow: 0 0 0 12px rgba(244, 67, 54, 0); }
        }

        .session-info {
            font-size: 12px;
            color: #666;
            text-align: center;
        }

        .error-msg {
            color: #f44336;
            font-size: 13px;
            padding: 8px;
            background: #2a1a1a;
            border-radius: 6px;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🎙️ Realtime Speech AI Agent</h1>
        <span id="statusBadge" class="status-badge status-idle">IDLE</span>
    </div>

    <div class="main">
        <div class="panel">
            <div class="panel-title">Transcript</div>
            <div id="transcriptArea" class="transcript-area">
                <div style="color:#666; font-style:italic;">Start recording to see transcript...</div>
            </div>
        </div>

        <div class="panel">
            <div class="panel-title">AI Answer</div>
            <div id="answerArea" class="answer-area">
                <span style="color:#666; font-style:italic;">Waiting for speech...</span>
            </div>
        </div>

        <div class="panel">
            <div class="panel-title">Notes</div>
            <div id="notesArea" class="notes-area">
                <span style="color:#666; font-style:italic;">No notes yet</span>
            </div>
        </div>

        <div id="errorArea"></div>

        <div class="controls">
            <button id="btnRecord" class="btn btn-record" onclick="toggleRecording()">🎤 Start Recording</button>
            <button id="btnInterrupt" class="btn btn-interrupt" onclick="sendInterrupt()" disabled>⏹ Interrupt</button>
            <button id="btnStop" class="btn btn-stop" onclick="stopSession()" disabled>🛑 End Session</button>
        </div>

        <div class="session-info" id="sessionInfo">Not connected</div>
    </div>

    <script src="app.js"></script>
</body>
</html>
